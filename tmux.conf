# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'mrjones2014/smart-splits.nvim'

# Set the prefix to C-s
unbind C-b
set -g prefix C-Space
bind-key -r C-Space send-prefix

is_vim='echo "#{pane_current_command}" | grep -iqE "(^|\/)g?(view|n?vim?)(diff)?$"'
bind -n C-s if-shell "$is_vim" "send-keys C-s" "display-message 'Wrong prefix!'"

# Theme and colors
## Enable 24-bit color support
set -g default-terminal "tmux-256color"
## This is needed for opencode/codex to correctly detect the system theme
set -g allow-passthrough on

# Match the shared Tokyo Night mode from ~/bin/theme.
run-shell "$HOME/bin/theme init-tmux"

# Use vim keybindings in copy mode
setw -g mode-keys vi

# Enable mouse support
set -g mouse on

# Window numbering
## Start at 1
set -g base-index 1
setw -g pane-base-index 1
## Renubmer when a window is closed
set-option -g renumber-windows on

# Use j/k/C-j/C-k to naviagte windows
bind-key j next-window
bind-key C-j next-window
bind-key k previous-window
bind-key C-k previous-window

# Open splits in the current path
bind-key n split-window -v  -c '#{pane_current_path}'
bind-key C-n split-window -v  -c '#{pane_current_path}'
bind-key v split-window -h  -c '#{pane_current_path}'
bind-key C-v split-window -h  -c '#{pane_current_path}'

# Reload config
bind-key R source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded"

# Synchronized typing into all panes in the current window
bind-key i setw synchronize-panes

# Add C-l/C-l for more convinient switching between the last window/pane - allows to keep C held
bind-key C-l last-window
bind-key C-\; last-pane

# Close panes / windows
bind-key X confirm-before -p "kill-window #W? (y/n)" kill-window

# Map copy mode to prefix ' so I can stay on the homerow
bind-key \' copy-mode
bind-key C-\' copy-mode

# Incremental search in copy-mode-vi
bind -T copy-mode-vi / command-prompt -ip '/' { send -X search-forward-incremental '%%%' }
bind -T copy-mode-vi ? command-prompt -ip '?' { send -X search-backward-incremental '%%%' }

# Predefined regex searches (backward by default)
bind -T copy-mode-vi u send -X search-backward "[a-z]+://[^ ]+" # URLs
bind -T copy-mode-vi p send -X search-backward "\\.?[a-zA-Z0-9_.-]+/[a-zA-Z0-9_./~-]+" # paths
bind -T copy-mode-vi i send -X search-backward "[0-9]{1,3}\\.[0-9]{1,3}\\.[0-9]{1,3}\\.[0-9]{1,3}" # IP addresses
bind -T copy-mode-vi d send -X search-backward "[0-9]+" # numbers
bind -T copy-mode-vi m send -X search-backward "[a-zA-Z0-9_.-]+@[a-zA-Z0-9.-]+" # emails
bind -T copy-mode-vi s send -X search-backward "[a-zA-Z0-9_.-]+\\.[a-zA-Z0-9_.-]+" # filenames

# Switch between sessions
bind-key J split-window -v "tmux list-sessions | sed -E 's/:.*$//' | grep -v \"^$(tmux display-message -p '#S')\$\" | fzf --reverse | xargs tmux switch-client -t"
# Start a new session
bind-key K split-window -v '{ [ -n "$WS" ] && find "$WS" -mindepth 1 -maxdepth 1 -type d; find "$HOME" -mindepth 1 -maxdepth 1 -type d; } | sed "s|^$HOME|~|" | fzf --reverse | sed "s|^~|$HOME|" | xargs -r tat'

# Break out pane into new window
bind-key b break-pane -d
# Break out pane into new session
bind-key C-b send-keys 'tat && exit' 'C-m'
# Break out window via choose-tree
bind-key B choose-tree -Zw -t '.' "join-pane -v -t '%%'"

# Prompted join-pane form another window
bind-key m command-prompt -p "Move pane from: "  "join-pane -v -s '%%'"
# Join a pane via choose-tree
bind-key M choose-tree -Zw -t '.' "join-pane -v -s '%%'"
# Easily swap a pane (targeted by pane number) with the current pane
bind-key s display-panes\; command-prompt -p "pane #: "  "swap-pane -t '%%'"
# Swap a pane via choose-tree
bind-key S choose-tree -Z -t '.' "swap-pane -t '%%'"

# Setup 'v' to begin selection as in Vim
unbind-key -T copy-mode-vi v
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi 'C-v' send-keys -X begin-selection\; send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy" \; display-message "Text copied to clipboard"

# show key bindings
bind-key ? display-popup -E "tmux-list-keys | fzf --height 100% --layout reverse --border"

# Navigating and resizing splits
set -g @smart-splits_no_wrap '' # to disable wrapping. (any value disables wrapping)

set -g @smart-splits_move_left_key  'C-h' # key-mapping for navigation.
set -g @smart-splits_move_down_key  'C-j' #  --"--
set -g @smart-splits_move_up_key    'C-k' #  --"--
set -g @smart-splits_move_right_key 'C-l' #  --"--

set -g @smart-splits_resize_left_key  'M-h' # key-mapping for resizing.
set -g @smart-splits_resize_down_key  'M-j' #  --"--
set -g @smart-splits_resize_up_key    'M-k' #  --"--
set -g @smart-splits_resize_right_key 'M-l' #  --"--

set -g @smart-splits_resize_step_size '3' # change the step-size for resizing.

# Enable local overwrites
source-file ~/.tmux.local.conf

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
